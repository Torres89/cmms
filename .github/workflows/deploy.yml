name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase required by Docker/GHCR)
        id: image
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/atlas-cmms" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.image.outputs.prefix }}-frontend:latest
          
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.image.outputs.prefix }}-backend:latest
          
      - name: Build and push Agent
        uses: docker/build-push-action@v5
        with:
          context: ./cmms-agent
          push: true
          tags: ${{ steps.image.outputs.prefix }}-agent:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/atlas-cmms
            # GH_USER_OR_ORG must be lowercase (Docker/GHCR requirement)
            export GH_USER_OR_ORG=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
            # Login to GHCR for private packages (add GHCR_PAT secret with read:packages scope; skip if public)
            [[ -n "${{ secrets.GHCR_PAT }}" ]] && echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            # Restart containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
